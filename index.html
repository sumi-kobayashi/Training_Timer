<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rep Timer">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='108' fill='%230a0a0a'/%3E%3Ccircle cx='256' cy='240' r='130' fill='none' stroke='%23FF3B30' stroke-width='18' stroke-linecap='round' stroke-dasharray='600 220'/%3E%3Ctext x='256' y='260' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='100' fill='%23f0f0f0'%3E4.0%3C/text%3E%3Ctext x='256' y='430' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='52' fill='%23FF3B30' letter-spacing='12'%3EREP%3C/text%3E%3C/svg%3E">
<title>Rep Timer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--c1:#111;--c2:#1e1e1e;--red:#FF3B30;--grn:#34C759;--org:#FF9500;--blu:#6B8AFF;--t1:#f0f0f0;--t2:#ccc;--t3:#888;--t4:#555;--t5:#333;--mono:'JetBrains Mono',ui-monospace,monospace}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden}
input,select,textarea,button{outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--red)!important}
::selection{background:#FF3B3044}
.mono{font-family:var(--mono)!important}
.hdr{padding:14px 18px 0;text-align:center}
.hdr h1{font-size:18px;font-weight:800;color:var(--red);letter-spacing:5px;text-transform:uppercase}
.hdr p{font-size:9px;color:var(--t5);letter-spacing:3px;margin-top:1px}
.tabs{display:flex;border-bottom:1px solid var(--c2)}
.tabs button{flex:1;padding:11px 0;background:0;color:var(--t4);border:none;border-bottom:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1.5px}
.tabs button.on{background:var(--c1);color:var(--red);border-bottom-color:var(--red)}
.view{display:none;padding:14px 18px 24px;overflow-y:auto;max-height:calc(100dvh - 100px)}
.view.on{display:block}
.lbl{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:4px}
.inp{width:100%;padding:9px 10px;background:var(--c1);color:#eee;border:1px solid #2a2a2a;border-radius:8px;font-size:14px;text-align:center}
.inp-l{text-align:left}
.btn{padding:9px 16px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.card{padding:10px 12px;background:var(--c1);border-radius:8px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.del{background:0;border:0;color:var(--t5);cursor:pointer;font-size:13px;padding:2px 4px}
.edit-btn{background:0;border:0;color:var(--blu);cursor:pointer;font-size:11px;padding:2px 6px}
.copy-btn{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;border:1px solid}
.sep{height:1px;background:var(--c2);margin:16px 0}
.ring-wrap{position:relative;width:270px;height:270px;margin:0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:4px;margin-bottom:2px}
.ring-time{font-size:52px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;line-height:1}
.ring-rep{font-size:13px;color:var(--t3);margin-top:6px}
.stats{display:flex;gap:28px;justify-content:center;margin:10px 0}
.stats div{text-align:center}
.stats .v{font-size:24px;font-weight:800;color:#eee}
.stats .k{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:2px}
.main-btn{flex:1;padding:15px 0;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:2px}
.rst-btn{padding:15px 18px;background:#282828;color:var(--t3);border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.meal-types{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.meal-types button{padding:7px 10px;background:0;color:var(--t4);border:1px solid var(--c2);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.meal-types button.on{background:#1a1a1a;color:var(--red);border-color:#FF3B3044}
.chart-wrap{background:var(--c1);border-radius:12px;padding:14px 6px 6px;margin:14px 0;height:220px;position:relative}
textarea.inp{resize:vertical;line-height:1.5;text-align:left}
.date-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--c2);padding-bottom:5px;margin-bottom:6px}
.date-hdr span{font-size:11px;color:var(--red);font-weight:700;letter-spacing:2px}
.date-hdr button{background:0;border:0;color:var(--t5);font-size:10px;cursor:pointer}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:#1a1a1a;border-radius:16px 16px 0 0;padding:20px 18px 30px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal .row{display:flex;gap:8px;margin-bottom:10px}
.modal .row>div{flex:1}
.modal .actions{display:flex;gap:8px;margin-top:16px}
.modal .actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="hdr"><h1>Rep Timer</h1><p>TRAINING COMPANION</p></div>

<div class="tabs" id="tabs">
  <button data-v="timer" class="on">Timer</button>
  <button data-v="log">Log</button>
  <button data-v="meal">Meal</button>
  <button data-v="body">Body</button>
</div>

<!-- TIMER -->
<div class="view on" id="v-timer" style="display:flex;flex-direction:column;align-items:center;gap:16px">
  <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px">
    <div>
      <label class="lbl">Exercise</label>
      <select id="t-ex" class="inp inp-l" style="font-size:13px"></select>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input id="t-newex" type="text" class="inp inp-l" placeholder="Add exercise..." style="flex:1;font-size:13px">
        <button class="btn" id="t-addex">+</button>
      </div>
      <button id="t-delex" style="margin-top:5px;padding:5px 8px;background:0;color:var(--t4);border:1px solid #2a2a2a;border-radius:6px;font-size:10px;cursor:pointer;display:none"></button>
    </div>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label class="lbl">Rep (sec)</label><input id="t-rep" type="number" class="inp mono" min="1" max="60" step="0.5" value="4"></div>
      <div style="flex:1"><label class="lbl">Rest (sec)</label><input id="t-rest" type="number" class="inp mono" min="1" max="600" step="1" value="60"></div>
    </div>
    <button id="t-snd" style="padding:7px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid"></button>
  </div>
  <div class="ring-wrap">
    <svg width="270" height="270"><circle cx="135" cy="135" r="118" fill="none" stroke="#161616" stroke-width="9"/><circle id="ring-arc" cx="135" cy="135" r="118" fill="none" stroke="#444" stroke-width="9" stroke-dasharray="741.4" stroke-dashoffset="741.4" stroke-linecap="round" style="transition:stroke-dashoffset .12s linear"/></svg>
    <div class="ring-center">
      <span class="ring-label" id="ring-label">Ready</span>
      <span class="ring-time mono" id="ring-time">0.0</span>
      <span class="ring-rep" id="ring-rep"></span>
    </div>
  </div>
  <div class="stats">
    <div><div class="v mono" id="st-sets">0</div><div class="k">Sets</div></div>
    <div><div class="v mono" id="st-reps">0</div><div class="k">Reps</div></div>
    <div><div class="v mono" id="st-total">0</div><div class="k">Total</div></div>
  </div>
  <div style="display:flex;gap:10px;width:100%;max-width:360px">
    <button id="t-main" class="main-btn" style="background:var(--red)">▶ START</button>
    <button id="t-reset" class="rst-btn" style="display:none">✕</button>
  </div>
</div>

<!-- LOG -->
<div class="view" id="v-log">
  <pre id="log-report" style="background:#0c0c0c;border:1px solid var(--c2);border-radius:10px;padding:12px;font-size:11px;color:#999;white-space:pre-wrap;line-height:1.6;margin-bottom:8px;overflow-x:auto" class="mono"></pre>
  <button id="log-copy" class="copy-btn" style="background:#0d0d1a;color:var(--blu);border-color:#6B8AFF33">📝 今日のレポートをコピー</button>
  <div class="sep"></div>
  <select id="log-filter" class="inp inp-l" style="margin-bottom:12px;font-size:13px"><option value="all">All Exercises</option></select>
  <div id="log-list"></div>
</div>

<!-- MEAL -->
<div class="view" id="v-meal">
  <div class="meal-types" id="meal-types"></div>
  <textarea id="m-content" class="inp" rows="2" placeholder="食事内容を入力..." style="font-size:13px;margin-bottom:8px"></textarea>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <input id="m-cal" type="number" class="inp mono" placeholder="kcal (任意)" style="flex:1;font-size:13px">
    <button class="btn" id="m-add">Save</button>
  </div>
  <button id="m-copy" class="copy-btn" style="background:#0d0d1a;color:var(--blu);border-color:#6B8AFF33">📝 今日の食事をコピー</button>
  <div id="meal-list" style="margin-top:14px"></div>
</div>

<!-- BODY -->
<div class="view" id="v-body">
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <div style="flex:1"><label class="lbl">Weight (kg)</label><input id="b-wt" type="number" step="0.1" class="inp mono" placeholder="75.0"></div>
    <div style="flex:1"><label class="lbl">Body Fat (%)</label><input id="b-bf" type="number" step="0.1" class="inp mono" placeholder="15.0"></div>
    <div style="display:flex;align-items:flex-end"><button class="btn" id="b-add">Save</button></div>
  </div>
  <button id="b-copy" class="copy-btn" style="background:#0d0d1a;color:var(--blu);border-color:#6B8AFF33">📋 体組成をコピー</button>
  <div class="chart-wrap" id="chart-wrap" style="display:none"><label class="lbl" style="padding-left:6px;margin-bottom:6px">Trend</label><div style="height:170px"><canvas id="body-chart"></canvas></div></div>
  <label class="lbl" style="margin-top:14px;margin-bottom:6px">Records</label>
  <div id="body-list"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// ── Storage ──
const LS={get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
let exercises=LS.get('rt-exercises',[]);
let logs=LS.get('rt-logs',[]);
let bodyMetrics=LS.get('rt-body',[]);
let meals=LS.get('rt-meals',[]);
let settings=LS.get('rt-settings',{repTime:4,restTime:60,snd:true});
const saveEx=()=>LS.set('rt-exercises',exercises);
const saveLogs=()=>LS.set('rt-logs',logs);
const saveBody=()=>LS.set('rt-body',bodyMetrics);
const saveMeals=()=>LS.set('rt-meals',meals);
const saveSets=()=>LS.set('rt-settings',settings);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const nowTime=()=>new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
const $=id=>document.getElementById(id);

// ── Audio ──
let _ac=null;
function ac(){
  if(!_ac||_ac.state==='closed')_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();
  return _ac;
}

// Generate tiny silent WAV to switch iOS to media audio mode
function makeSilentWav(){
  const sr=8000,len=sr; // 1 second of silence
  const buf=new ArrayBuffer(44+len*2),d=new DataView(buf);
  function ws(o,s){for(let i=0;i<s.length;i++)d.setUint8(o+i,s.charCodeAt(i))}
  ws(0,'RIFF');d.setUint32(4,36+len*2,true);ws(8,'WAVE');ws(12,'fmt ');
  d.setUint32(16,16,true);d.setUint16(20,1,true);d.setUint16(22,1,true);
  d.setUint32(24,sr,true);d.setUint32(28,sr*2,true);d.setUint16(32,2,true);
  d.setUint16(34,16,true);ws(36,'data');d.setUint32(40,len*2,true);
  // all samples stay 0 = silence
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

let silentEl=null;
function initMediaAudio(){
  if(silentEl)return;
  try{
    silentEl=document.createElement('audio');
    silentEl.src=makeSilentWav();
    silentEl.loop=true;
    silentEl.volume=0.01;
    silentEl.play().catch(function(){});
  }catch(e){silentEl=null}
}

document.addEventListener('visibilitychange',function(){
  if(!document.hidden){
    if(_ac&&_ac.state==='suspended')_ac.resume();
    if(silentEl&&silentEl.paused)silentEl.play().catch(function(){});
  }
});
document.addEventListener('touchstart',function(){
  if(_ac&&_ac.state==='suspended')_ac.resume();
  if(silentEl&&silentEl.paused)silentEl.play().catch(function(){});
},{passive:true});

function tone(f,d,v,t){
  v=v||1.0;t=t||'square';
  try{
    var c=ac();
    var o=c.createOscillator(),g=c.createGain();
    o.frequency.value=f;o.type=t;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d/1000);
    o.connect(g).connect(c.destination);
    o.start();o.stop(c.currentTime+d/1000+0.05);
  }catch(e){}
}
var SFX={
  repTick:function(){tone(1000,70,0.9,'sine')},
  repDone:function(){tone(1320,90,1.0,'sine')},
  setStart:function(){tone(523,110,0.8,'sine');setTimeout(function(){tone(659,110,0.8,'sine')},110);setTimeout(function(){tone(784,150,1.0,'sine')},220)},
  restStart:function(){tone(880,130,1.0,'square');setTimeout(function(){tone(660,160,0.9,'square')},160)},
  restEnd:function(){tone(880,90,1.0,'square');setTimeout(function(){tone(880,90,1.0,'square')},150);setTimeout(function(){tone(1100,180,1.0,'square')},300)},
  countdown:function(){tone(880,80,0.8,'sine')},
  warn10:function(){tone(600,230,0.9,'sine');setTimeout(function(){tone(800,230,0.9,'sine')},240)}
};

// ── Wake Lock (prevent auto-lock) ──
let wakeLock=null;
async function requestWakeLock(){
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch{}
}
async function releaseWakeLock(){
  try{if(wakeLock){await wakeLock.release();wakeLock=null}}catch{}
}
// Re-acquire wake lock when returning to app (iOS releases it on switch)
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&mode!=='idle')requestWakeLock()});

// ── Modal ──
function closeModal(){$('modal-bg').classList.remove('on')}

function openEditLog(idx){
  const e=logs[idx]; if(!e)return;
  $('modal').innerHTML=`<h3>トレーニング編集<button class="del" onclick="closeModal()" style="font-size:18px">✕</button></h3>
    <div class="row"><div><label class="lbl">Exercise</label><input id="ed-ex" class="inp inp-l" value="${e.exercise}" style="font-size:13px"></div></div>
    <div class="row">
      <div><label class="lbl">Set #</label><input id="ed-set" type="number" class="inp mono" value="${e.set}" min="1"></div>
      <div><label class="lbl">Reps</label><input id="ed-reps" type="number" class="inp mono" value="${e.reps}" min="0"></div>
    </div>
    <div class="row">
      <div><label class="lbl">Rep Time</label><input id="ed-rt" type="number" class="inp mono" value="${e.repTime}" step="0.5"></div>
      <div><label class="lbl">Rest Time</label><input id="ed-rest" type="number" class="inp mono" value="${e.restTime}"></div>
    </div>
    <div class="row"><div><label class="lbl">Time</label><input id="ed-time" type="time" class="inp mono" value="${e.time||''}" style="font-size:13px"></div>
      <div><label class="lbl">Date</label><input id="ed-date" type="date" class="inp mono" value="${e.date}" style="font-size:13px"></div></div>
    <div class="actions">
      <button style="background:#282828;color:var(--t3)" onclick="closeModal()">Cancel</button>
      <button style="background:var(--red);color:#fff" onclick="saveEditLog(${idx})">Save</button>
    </div>`;
  $('modal-bg').classList.add('on');
}

window.saveEditLog=idx=>{
  logs[idx].exercise=$('ed-ex').value.trim()||logs[idx].exercise;
  logs[idx].set=parseInt($('ed-set').value)||logs[idx].set;
  logs[idx].reps=parseInt($('ed-reps').value)||0;
  logs[idx].repTime=parseFloat($('ed-rt').value)||logs[idx].repTime;
  logs[idx].restTime=parseInt($('ed-rest').value)||logs[idx].restTime;
  logs[idx].time=$('ed-time').value||logs[idx].time;
  logs[idx].date=$('ed-date').value||logs[idx].date;
  saveLogs(); closeModal(); renderLog();
};

function openEditMeal(idx){
  const m=meals[idx]; if(!m)return;
  const mtOpts=MEAL_TYPES.map(t=>`<option value="${t.id}"${t.id===m.type?' selected':''}>${t.icon} ${t.label}</option>`).join('');
  $('modal').innerHTML=`<h3>食事編集<button class="del" onclick="closeModal()" style="font-size:18px">✕</button></h3>
    <div class="row"><div><label class="lbl">Type</label><select id="ed-mtype" class="inp inp-l" style="font-size:13px">${mtOpts}</select></div></div>
    <div class="row"><div><label class="lbl">Content</label><textarea id="ed-mcont" class="inp" rows="2" style="font-size:13px;text-align:left">${m.content}</textarea></div></div>
    <div class="row">
      <div><label class="lbl">kcal</label><input id="ed-mcal" type="number" class="inp mono" value="${m.calories||''}" placeholder="任意"></div>
      <div><label class="lbl">Time</label><input id="ed-mtime" type="time" class="inp mono" value="${m.time||''}" style="font-size:13px"></div>
    </div>
    <div class="row"><div><label class="lbl">Date</label><input id="ed-mdate" type="date" class="inp mono" value="${m.date}" style="font-size:13px"></div><div></div></div>
    <div class="actions">
      <button style="background:#282828;color:var(--t3)" onclick="closeModal()">Cancel</button>
      <button style="background:var(--red);color:#fff" onclick="saveEditMeal(${idx})">Save</button>
    </div>`;
  $('modal-bg').classList.add('on');
}

window.saveEditMeal=idx=>{
  meals[idx].type=$('ed-mtype').value;
  meals[idx].content=$('ed-mcont').value.trim()||meals[idx].content;
  meals[idx].calories=$('ed-mcal').value?parseInt($('ed-mcal').value):null;
  meals[idx].time=$('ed-mtime').value||meals[idx].time;
  meals[idx].date=$('ed-mdate').value||meals[idx].date;
  saveMeals(); closeModal(); renderMeals();
};

// ── Tabs ──
const views=['timer','log','meal','body'];
document.querySelectorAll('#tabs button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    views.forEach(v=>{const el=$('v-'+v);el.classList.toggle('on',v===b.dataset.v);el.style.display=v===b.dataset.v?(v==='timer'?'flex':'block'):'none'});
    if(b.dataset.v==='log')renderLog();if(b.dataset.v==='meal')renderMeals();if(b.dataset.v==='body')renderBody();
  };
});

const MEAL_TYPES=[
  {id:'breakfast',label:'朝食',icon:'🍳'},{id:'lunch',label:'昼食',icon:'🍛'},
  {id:'dinner',label:'夕食',icon:'🍖'},{id:'snack',label:'間食',icon:'🍪'},
  {id:'supplement',label:'サプリ',icon:'💊'},
];

// ══════════════════════════════
//  TIMER
// ══════════════════════════════
const CIRC=2*Math.PI*118;
let mode='idle',tLeft=0,repCount=0,setCount=0,totalReps=0;
let iv=null,tRef=0,rRef=0,lastCd=-1,lastSec=-1,warned10=false;

$('t-rep').value=settings.repTime;
$('t-rest').value=settings.restTime;

function updateSndBtn(){const b=$('t-snd');b.textContent=settings.snd?'🔊 ON':'🔇 OFF';b.style.background=settings.snd?'#0d1a0d':'#1a0d0d';b.style.color=settings.snd?'var(--grn)':'var(--red)';b.style.borderColor=settings.snd?'#34C75933':'#FF3B3033'}
updateSndBtn();
$('t-snd').onclick=()=>{settings.snd=!settings.snd;saveSets();updateSndBtn()};

function getRepTime(){return parseFloat($('t-rep').value)||4}
function getRestTime(){return parseInt($('t-rest').value)||60}
$('t-rep').oninput=()=>{settings.repTime=getRepTime();saveSets()};
$('t-rest').oninput=()=>{settings.restTime=getRestTime();saveSets()};

function renderExSelect(){
  const s=$('t-ex'),cur=s.value;
  s.innerHTML=exercises.length===0?'<option value="">No exercises</option>':exercises.map(e=>`<option value="${e}">${e}</option>`).join('');
  if(exercises.includes(cur))s.value=cur;
  $('t-delex').style.display=exercises.length>0?'':'none';
  $('t-delex').textContent=`Delete "${$('t-ex').value}"`;
  const lf=$('log-filter'),lfv=lf.value;
  lf.innerHTML='<option value="all">All Exercises</option>'+exercises.map(e=>`<option value="${e}">${e}</option>`).join('');
  if(exercises.includes(lfv)||lfv==='all')lf.value=lfv;
}
renderExSelect();
$('t-ex').onchange=()=>{$('t-delex').textContent=`Delete "${$('t-ex').value}"`};
$('t-addex').onclick=()=>{const v=$('t-newex').value.trim();if(v&&!exercises.includes(v)){exercises.push(v);saveEx();renderExSelect();$('t-ex').value=v;$('t-delex').textContent=`Delete "${v}"`}$('t-newex').value=''};
$('t-newex').onkeydown=e=>{if(e.key==='Enter')$('t-addex').click()};
$('t-delex').onclick=()=>{const v=$('t-ex').value;exercises=exercises.filter(e=>e!==v);saveEx();renderExSelect()};

function updateRing(){
  const rt=getRepTime(),rest=getRestTime();
  let prog=0;
  if(mode==='rep')prog=(rt-tLeft)/rt;else if(mode==='rest')prog=(rest-tLeft)/rest;
  const col=mode==='rep'?'var(--red)':mode==='rest'?'var(--grn)':'#444';
  $('ring-arc').setAttribute('stroke',col);$('ring-arc').setAttribute('stroke-dashoffset',CIRC*(1-prog));
  $('ring-label').textContent=mode==='idle'?'Ready':mode==='rep'?'Rep':'Rest';
  $('ring-label').style.color=col;
  if(mode==='idle')$('ring-time').textContent='0.0';
  else if(mode==='rest'&&tLeft>9.95)$('ring-time').textContent=Math.ceil(tLeft);
  else $('ring-time').textContent=tLeft.toFixed(1);
  $('ring-rep').textContent=mode==='rep'?`Rep #${repCount}`:'';
  $('st-sets').textContent=setCount;$('st-reps').textContent=repCount;$('st-total').textContent=totalReps;
}

function updateMainBtn(){
  const b=$('t-main');
  if(mode==='idle'){b.textContent='▶ START';b.style.background='var(--red)'}
  else if(mode==='rep'){b.textContent='⏸ REST';b.style.background='var(--grn)'}
  else{b.textContent='⏩ SKIP';b.style.background='var(--org)'}
  $('t-reset').style.display=mode==='idle'?'none':'';
}

function stop(){if(iv){clearInterval(iv);iv=null}}

function startRep(){
  stop();requestWakeLock();const rt=getRepTime();
  mode='rep';tRef=rt;tLeft=rt;lastSec=-1;lastCd=-1;
  if(settings.snd)SFX.setStart();
  updateMainBtn();updateRing();
  iv=setInterval(()=>{
    tRef-=0.1;
    const sec=Math.floor(tRef);
    if(sec!==lastSec&&sec>=0&&tRef>0.05){lastSec=sec;if(settings.snd)SFX.repTick()}
    if(tRef<=0){rRef++;repCount=rRef;totalReps++;if(settings.snd)SFX.repDone();tRef=rt;lastSec=-1}
    tLeft=Math.max(0,tRef);updateRing();
  },100);
}

function startRest(){
  stop();const reps=rRef,rt=getRepTime(),rest=getRestTime();
  mode='rest';tRef=rest;tLeft=rest;lastCd=-1;warned10=false;
  setCount++;
  const ex=$('t-ex').value;
  if(reps>0&&ex){logs.push({date:todayStr(),time:nowTime(),exercise:ex,reps,set:setCount,repTime:rt,restTime:rest});saveLogs()}
  rRef=0;repCount=0;
  if(settings.snd)SFX.restStart();
  updateMainBtn();updateRing();
  iv=setInterval(()=>{
    tRef-=0.1;const sec=Math.ceil(tRef);
    if(!warned10&&sec<=10&&sec>=1&&tRef>0){warned10=true;if(settings.snd)SFX.warn10()}
    if(sec<=5&&sec>=1&&sec!==lastCd&&tRef>0){lastCd=sec;if(settings.snd)SFX.countdown()}
    if(tRef<=0){stop();if(settings.snd)SFX.restEnd();startRep();return}
    tLeft=Math.max(0,tRef);updateRing();
  },100);
}

$('t-main').onclick=function(){try{initMediaAudio();ac()}catch(e){};if(mode==='idle'){rRef=0;repCount=0;startRep()}else if(mode==='rep')startRest();else{stop();startRep()}};
$('t-reset').onclick=()=>{stop();releaseWakeLock();mode='idle';tLeft=0;repCount=0;rRef=0;setCount=0;totalReps=0;updateMainBtn();updateRing()};
updateRing();

// ══════════════════════════════
//  REPORT
// ══════════════════════════════
function genReport(d){
  const dl=logs.filter(l=>l.date===d),db=bodyMetrics.filter(m=>m.date===d),dm=meals.filter(m=>m.date===d);
  const L=[`📅 ${d}`,'─'.repeat(28)];
  if(db.length){const b=db[db.length-1];L.push('\n🏋️ 体組成');if(b.weight)L.push(`  体重: ${b.weight} kg`);if(b.bodyFat)L.push(`  体脂肪率: ${b.bodyFat} %`)}
  if(dm.length){L.push('\n🍽️ 食事');dm.forEach(m=>{const mt=MEAL_TYPES.find(t=>t.id===m.type);let l=`  ${mt?mt.icon:'🍽'} ${mt?mt.label:m.type}`;if(m.time)l+=` (${m.time})`;l+=`: ${m.content}`;if(m.calories)l+=` [${m.calories}kcal]`;L.push(l)});const tc=dm.reduce((s,m)=>s+(m.calories||0),0);if(tc>0)L.push(`  合計: ${tc} kcal`)}
  if(dl.length){const byEx={};dl.forEach(l=>{if(!byEx[l.exercise])byEx[l.exercise]=[];byEx[l.exercise].push(l)});L.push('\n💪 トレーニング');Object.entries(byEx).forEach(([ex,sets])=>{const tr=sets.reduce((s,x)=>s+x.reps,0);L.push(`\n  ▸ ${ex}`);sets.forEach(s=>L.push(`    Set${s.set}: ${s.reps}reps (${s.repTime}s/rep, rest ${s.restTime}s)`));L.push(`    → ${sets.length}sets / ${tr}reps`)});const gt=dl.reduce((s,l)=>s+l.reps,0);L.push('\n'+'─'.repeat(28));L.push(`📊 ${Object.keys(byEx).length}種目 / ${dl.length}sets / ${gt}reps`)}
  if(!dl.length&&!db.length&&!dm.length)L.push('\n記録なし');
  return L.join('\n');
}

async function copyText(txt,btn){
  try{await navigator.clipboard.writeText(txt)}catch{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}
  const orig=btn.textContent;btn.textContent='✓ コピーしました！';btn.style.background='#0d1a0d';btn.style.color='var(--grn)';btn.style.borderColor='#34C75933';
  setTimeout(()=>{btn.textContent=orig;btn.style.background='#0d0d1a';btn.style.color='var(--blu)';btn.style.borderColor='#6B8AFF33'},2000);
}

// ══════════════════════════════
//  LOG VIEW
// ══════════════════════════════
$('log-copy').onclick=()=>copyText(genReport(todayStr()),$('log-copy'));
$('log-filter').onchange=renderLog;

function renderLog(){
  $('log-report').textContent=genReport(todayStr());
  const filt=$('log-filter').value;
  const fl=filt==='all'?logs:logs.filter(l=>l.exercise===filt);
  const grouped={};fl.forEach(l=>{if(!grouped[l.date])grouped[l.date]=[];grouped[l.date].push(l)});
  const dates=Object.keys(grouped).sort().reverse();
  if(!dates.length){$('log-list').innerHTML='<div style="color:var(--t4);text-align:center;padding:36px;font-size:13px">No records yet</div>';return}
  let h='';
  dates.forEach(date=>{
    h+=`<div class="date-hdr"><span>${date}</span><button onclick="clearLogDay('${date}')">Clear day</button></div>`;
    grouped[date].forEach(entry=>{
      const idx=logs.indexOf(entry);
      h+=`<div class="card">
        <div style="flex:1;cursor:pointer" onclick="openEditLog(${idx})">
          <span style="color:var(--t2);font-size:13px;font-weight:600">${entry.exercise}</span>
          <span style="color:var(--t4);font-size:11px;margin-left:6px">Set${entry.set}</span>
          <div style="margin-top:2px">
            <span class="mono" style="color:var(--red);font-weight:700;font-size:15px">${entry.reps}</span>
            <span style="color:var(--t4);font-size:10px"> reps</span>
            <span style="color:var(--t5);font-size:9px;margin-left:6px">${entry.repTime}s / ${entry.restTime}s</span>
          </div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="edit-btn" onclick="openEditLog(${idx})">✎</button>
          <button class="del" onclick="deleteLog(${idx})">✕</button>
        </div></div>`;
    });
    h+='<div style="height:12px"></div>';
  });
  $('log-list').innerHTML=h;
}

window.openEditLog=openEditLog;
window.deleteLog=idx=>{logs.splice(idx,1);saveLogs();renderLog()};
window.clearLogDay=d=>{if(confirm(`${d}の記録を全て削除しますか？`)){logs=logs.filter(l=>l.date!==d);saveLogs();renderLog()}};

// ══════════════════════════════
//  MEAL VIEW
// ══════════════════════════════
let mealType='breakfast';
function renderMealTypes(){$('meal-types').innerHTML=MEAL_TYPES.map(mt=>`<button class="${mt.id===mealType?'on':''}" onclick="setMealType('${mt.id}')">${mt.icon} ${mt.label}</button>`).join('')}
renderMealTypes();
window.setMealType=id=>{mealType=id;renderMealTypes()};

$('m-add').onclick=()=>{
  const c=$('m-content').value.trim();if(!c)return;
  const cal=$('m-cal').value?parseInt($('m-cal').value):null;
  meals.push({date:todayStr(),time:nowTime(),type:mealType,content:c,calories:cal});
  saveMeals();$('m-content').value='';$('m-cal').value='';renderMeals();
};

$('m-copy').onclick=()=>{
  const dm=meals.filter(m=>m.date===todayStr());
  if(!dm.length){copyText('今日の食事記録なし',$('m-copy'));return}
  const L=[`🍽️ ${todayStr()} 食事報告`];
  dm.forEach(m=>{const mt=MEAL_TYPES.find(t=>t.id===m.type);let l=`${mt?mt.icon:''} ${mt?mt.label:m.type}`;if(m.time)l+=` (${m.time})`;l+=`: ${m.content}`;if(m.calories)l+=` [${m.calories}kcal]`;L.push(l)});
  const tc=dm.reduce((s,m)=>s+(m.calories||0),0);if(tc>0)L.push(`\n合計: ${tc} kcal`);
  copyText(L.join('\n'),$('m-copy'));
};

function renderMeals(){
  const d=todayStr(),dm=meals.filter(m=>m.date===d),past=meals.filter(m=>m.date!==d);
  const pg={};past.forEach(m=>{if(!pg[m.date])pg[m.date]=[];pg[m.date].push(m)});
  const pDates=Object.keys(pg).sort().reverse().slice(0,7);
  const tc=dm.reduce((s,m)=>s+(m.calories||0),0);
  let h='';
  if(dm.length){
    h+=`<div class="date-hdr"><span>TODAY</span>${tc>0?`<span class="mono" style="color:var(--org);font-size:11px">${tc} kcal</span>`:''}</div>`;
    dm.forEach(m=>{
      const idx=meals.indexOf(m),mt=MEAL_TYPES.find(t=>t.id===m.type);
      h+=`<div class="card" style="align-items:flex-start">
        <div style="flex:1;cursor:pointer" onclick="openEditMeal(${idx})">
          <div><span style="font-size:13px">${mt?mt.icon:''}</span>
          <span style="color:var(--t3);font-size:12px;font-weight:600;margin-left:4px">${mt?mt.label:m.type}</span>
          <span style="color:var(--t5);font-size:10px;margin-left:6px">${m.time}</span></div>
          <div style="color:var(--t2);font-size:13px;margin-top:3px;line-height:1.4">${m.content}</div>
          ${m.calories?`<div class="mono" style="color:var(--org);font-size:11px;margin-top:2px">${m.calories} kcal</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button class="edit-btn" onclick="openEditMeal(${idx})">✎</button>
          <button class="del" onclick="deleteMeal(${idx})">✕</button>
        </div></div>`;
    });
  }
  pDates.forEach(date=>{
    h+=`<div style="margin-top:14px"><div style="font-size:11px;color:var(--t4);font-weight:700;letter-spacing:2px;border-bottom:1px solid #1a1a1a;padding-bottom:4px;margin-bottom:5px">${date}</div>`;
    pg[date].forEach(m=>{
      const idx=meals.indexOf(m),mt=MEAL_TYPES.find(t=>t.id===m.type);
      h+=`<div class="card" style="align-items:flex-start">
        <div style="flex:1;cursor:pointer" onclick="openEditMeal(${idx})">
          <span style="font-size:12px">${mt?mt.icon:''}</span>
          <span style="color:var(--t3);font-size:11px;margin-left:4px">${mt?mt.label:m.type}</span>
          <span style="color:var(--t5);font-size:10px;margin-left:6px">${m.time||''}</span>
          <div style="color:var(--t3);font-size:12px;margin-top:2px">${m.content}${m.calories?` [${m.calories}kcal]`:''}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="edit-btn" onclick="openEditMeal(${idx})">✎</button>
          <button class="del" onclick="deleteMeal(${idx})">✕</button>
        </div></div>`;
    });
    h+='</div>';
  });
  $('meal-list').innerHTML=h||'<div style="color:var(--t5);text-align:center;padding:28px;font-size:13px">記録なし</div>';
}

window.openEditMeal=openEditMeal;
window.deleteMeal=idx=>{meals.splice(idx,1);saveMeals();renderMeals()};

// ══════════════════════════════
//  BODY VIEW
// ══════════════════════════════
let bodyChart=null;

$('b-add').onclick=()=>{
  const w=$('b-wt').value,bf=$('b-bf').value;if(!w&&!bf)return;
  bodyMetrics.push({date:todayStr(),time:nowTime(),weight:w?parseFloat(w):null,bodyFat:bf?parseFloat(bf):null});
  saveBody();$('b-wt').value='';$('b-bf').value='';renderBody();
};

$('b-copy').onclick=()=>{
  const db=bodyMetrics.filter(m=>m.date===todayStr());
  if(!db.length){copyText('今日の体組成記録なし',$('b-copy'));return}
  const b=db[db.length-1];let t=`🏋️ ${todayStr()} 体組成\n`;
  if(b.weight)t+=`体重: ${b.weight} kg\n`;if(b.bodyFat)t+=`体脂肪率: ${b.bodyFat} %`;
  copyText(t,$('b-copy'));
};

function renderBody(){
  const byDate={};bodyMetrics.forEach(m=>{byDate[m.date]=m});
  const cd=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
  if(cd.length>=2){
    $('chart-wrap').style.display='';
    if(bodyChart)bodyChart.destroy();
    bodyChart=new Chart($('body-chart'),{
      type:'line',
      data:{labels:cd.map(m=>m.date.slice(5)),
        datasets:[
          {label:'Weight (kg)',data:cd.map(m=>m.weight),borderColor:'#FF3B30',backgroundColor:'#FF3B3022',tension:.3,pointRadius:3,yAxisID:'y',spanGaps:true},
          {label:'Body Fat (%)',data:cd.map(m=>m.bodyFat),borderColor:'#34C759',backgroundColor:'#34C75922',tension:.3,pointRadius:3,yAxisID:'y1',spanGaps:true},
        ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#888',font:{size:10}}}},
        scales:{
          x:{ticks:{color:'#555',font:{size:9}},grid:{color:'#1e1e1e'}},
          y:{position:'left',ticks:{color:'#FF3B30',font:{size:9}},grid:{color:'#1e1e1e'}},
          y1:{position:'right',ticks:{color:'#34C759',font:{size:9}},grid:{drawOnChartArea:false}},
        }}
    });
  } else {$('chart-wrap').style.display='none'}
  if(!bodyMetrics.length){$('body-list').innerHTML='<div style="color:var(--t5);text-align:center;padding:28px;font-size:13px">No records yet</div>';return}
  let h='';
  [...bodyMetrics].reverse().forEach((m,i)=>{
    const idx=bodyMetrics.length-1-i;
    h+=`<div class="card">
      <div style="color:var(--t3);font-size:11px">${m.date} ${m.time||''}</div>
      <div style="display:flex;align-items:center;gap:12px">
        ${m.weight?`<span class="mono" style="color:var(--red);font-weight:700;font-size:13px">${m.weight}<span style="color:var(--t4);font-size:9px"> kg</span></span>`:''}
        ${m.bodyFat?`<span class="mono" style="color:var(--grn);font-weight:700;font-size:13px">${m.bodyFat}<span style="color:var(--t4);font-size:9px"> %</span></span>`:''}
        <button class="del" onclick="deleteBody(${idx})">✕</button>
      </div></div>`;
  });
  $('body-list').innerHTML=h;
}

window.deleteBody=idx=>{bodyMetrics.splice(idx,1);saveBody();renderBody()};

// ── Clean up old service workers ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister()});
  });
  if('caches' in window){
    caches.keys().then(function(keys){
      keys.forEach(function(k){caches.delete(k)});
    });
  }
}
</script>
</body>
